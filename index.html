<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#20232a">
  <meta name="description" content="A colourful retro photo and video wall.">
  <title>Incognito Planet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #111217;
      --paper: #f1f2f3;
      --cream: #c9ccd0;
      --red: #7a354f;
      --magenta: #8f526d;
      --emerald: #173f47;
      --green: #7fb7b5;
      --purple: #574c74;
      --muted: #62666d;
      --slate: #292c33;
      --steel: #434851;
      --line: rgba(17, 18, 23, .14);
      --media-fit: cover;
      --pixel-font: "Silkscreen", "Courier New", monospace;
      --body-font: "Space Mono", "Courier New", monospace;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      scrollbar-color: var(--ink) var(--cream);
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--ink);
      font-family: var(--body-font);
      background:
        radial-gradient(circle at 10% 8%, rgba(127, 183, 181, .17), transparent 25rem),
        radial-gradient(circle at 92% 14%, rgba(122, 53, 79, .14), transparent 27rem),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        linear-gradient(var(--line) 1px, transparent 1px),
        var(--cream);
      background-size: auto, auto, 24px 24px, 24px 24px, auto;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      opacity: .13;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent 0,
          transparent 3px,
          rgba(13, 13, 15, .14) 4px
        );
      mix-blend-mode: multiply;
    }

    body::after {
      content: "";
      position: fixed;
      right: -74px;
      bottom: -74px;
      z-index: -1;
      width: 210px;
      aspect-ratio: 1;
      border: 5px solid var(--ink);
      background:
        linear-gradient(90deg, transparent 48%, var(--ink) 48% 52%, transparent 52%),
        linear-gradient(transparent 48%, var(--ink) 48% 52%, transparent 52%),
        var(--purple);
      background-size: 32px 32px;
      box-shadow: -12px -12px 0 var(--magenta);
      transform: rotate(8deg);
      opacity: .2;
    }

    .site-header {
      width: min(1180px, calc(100% - 32px));
      margin: 24px auto 0;
      padding: clamp(24px, 5vw, 56px);
      position: relative;
      overflow: hidden;
      border: 3px solid var(--ink);
      border-radius: 4px;
      color: var(--paper);
      background:
        radial-gradient(circle at 86% 18%, rgba(127, 183, 181, .16), transparent 15rem),
        linear-gradient(135deg, rgba(255,255,255,.07), transparent 42%),
        linear-gradient(135deg, #20232a, #343840);
      box-shadow: 9px 9px 0 var(--ink);
      isolation: isolate;
    }

    .site-header::before {
      content: "";
      position: absolute;
      top: 18px;
      right: 18px;
      width: 90px;
      height: 18px;
      background:
        linear-gradient(90deg,
          var(--green) 0 18px,
          transparent 18px 24px,
          var(--red) 24px 42px,
          transparent 42px 48px,
          var(--paper) 48px 66px,
          transparent 66px 72px,
          var(--purple) 72px 90px);
      border: 3px solid var(--ink);
      box-shadow: 4px 4px 0 var(--ink);
      animation: pixel-pulse 3.6s steps(2, end) infinite;
    }

    .site-header::after {
      content: "■ ■ ■";
      position: absolute;
      right: clamp(20px, 5vw, 62px);
      bottom: clamp(18px, 4vw, 38px);
      z-index: -1;
      color: rgba(241, 242, 243, .12);
      font-family: var(--pixel-font);
      font-size: clamp(1.4rem, 4vw, 3.6rem);
      letter-spacing: .2em;
      transform: rotate(-7deg);
    }

    .eyebrow {
      margin: 0 0 18px;
      font-family: var(--pixel-font);
      font-size: clamp(.58rem, 1.5vw, .74rem);
      line-height: 1.7;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 980px;
      margin: 0;
      position: relative;
      z-index: 1;
      font-family: var(--pixel-font);
      line-height: 1;
      text-transform: uppercase;
    }

    .title-main {
      display: block;
      color: var(--paper);
      font-size: clamp(2rem, 7vw, 5.65rem);
      letter-spacing: -.045em;
    }

    .title-accent {
      display: inline-flex;
      align-items: center;
      margin-top: clamp(12px, 2vw, 20px);
      padding: .35em .48em .3em;
      color: var(--paper);
      background: var(--emerald);
      border: 3px solid var(--ink);
      box-shadow: 5px 5px 0 var(--red);
      font-size: clamp(1rem, 3.4vw, 2.45rem);
      letter-spacing: .08em;
      transform: rotate(-1deg);
    }

    .title-accent::before {
      content: "";
      width: .52em;
      height: .52em;
      margin-right: .4em;
      background: var(--green);
      box-shadow: .3em 0 0 var(--purple);
    }

    .subtitle {
      max-width: 710px;
      margin: 24px 0 0;
      position: relative;
      z-index: 1;
      font-size: clamp(.9rem, 2vw, 1.05rem);
      font-weight: 700;
      line-height: 1.65;
    }

    .toolbar {
      width: min(1180px, calc(100% - 32px));
      margin: 22px auto 0;
      padding: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      border: 3px solid var(--ink);
      border-radius: 4px;
      background: rgba(241, 242, 243, .96);
      box-shadow: 6px 6px 0 var(--steel);
    }

    button {
      appearance: none;
      min-height: 46px;
      padding: 11px 15px;
      border: 3px solid var(--ink);
      border-radius: 2px;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--pixel-font);
      font-size: .62rem;
      line-height: 1.45;
      letter-spacing: .04em;
      text-transform: uppercase;
      box-shadow: 4px 4px 0 var(--ink);
      cursor: pointer;
      transition:
        transform .16s steps(2, end),
        box-shadow .16s steps(2, end),
        background-color .18s ease;
    }

    button:hover {
      background: var(--green);
      color: var(--ink);
      transform: translate(-1px, -1px);
      box-shadow: 6px 6px 0 var(--ink);
    }

    button:focus-visible {
      outline: 4px solid var(--purple);
      outline-offset: 4px;
    }

    button:active {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0 var(--ink);
    }

    button[data-active="true"] {
      background: var(--emerald);
      color: var(--paper);
      box-shadow: 4px 4px 0 var(--red);
    }

    .status[hidden] {
      display: none;
    }

    .status {
      margin-left: auto;
      color: var(--paper);
      padding: 10px 12px;
      border: 3px solid var(--ink);
      border-radius: 2px;
      background: var(--red);
      font-family: var(--pixel-font);
      font-size: .57rem;
      line-height: 1.5;
      box-shadow: 3px 3px 0 var(--ink);
    }

    .gallery {
      width: min(1540px, calc(100% - 20px));
      min-height: 48vh;
      margin: 30px auto 80px;
      padding: 20px 12px 44px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      align-items: start;
      gap: clamp(20px, 2.2vw, 32px);
    }

    .polaroid {
      --tilt: 0deg;
      --lift: 0px;
      width: 100%;
      min-width: 0;
      margin: 0;
      padding: 11px 11px 44px;
      position: relative;
      border: 3px solid var(--ink);
      border-radius: 3px;
      background: var(--paper);
      box-shadow: 7px 8px 0 var(--ink);
      opacity: 0;
      transform: translateY(var(--lift)) rotate(var(--tilt)) scale(.94);
      animation: card-in .52s cubic-bezier(.16, 1, .3, 1) forwards;
      animation-delay: var(--delay);
      transition:
        transform .2s cubic-bezier(.16, 1, .3, 1),
        box-shadow .2s cubic-bezier(.16, 1, .3, 1);
    }

    .polaroid:nth-child(4n + 1) { background: #eeeeec; }
    .polaroid:nth-child(4n + 2) { background: #dcdcdc; }
    .polaroid:nth-child(4n + 3) { background: #c8c8cb; }
    .polaroid:nth-child(4n)     { background: #f7f7f5; }

    .polaroid::before {
      content: "";
      position: absolute;
      top: -9px;
      left: 50%;
      width: 54px;
      height: 15px;
      border: 2px solid rgba(13, 13, 15, .38);
      background: rgba(65, 65, 70, .78);
      transform: translateX(-50%) rotate(-2deg);
      opacity: .82;
    }

    .polaroid:hover,
    .polaroid:focus-within {
      z-index: 3;
      transform: translateY(calc(var(--lift) - 8px)) rotate(0deg) scale(1.025);
      box-shadow: 11px 13px 0 var(--ink);
    }

    .media-button {
      display: block;
      width: 100%;
      min-height: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      cursor: zoom-in;
    }

    .media-button:hover,
    .media-button:active {
      background: transparent;
      transform: none;
      box-shadow: none;
    }

    .media-window {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      position: relative;
      display: block;
      border: 3px solid var(--ink);
      background:
        linear-gradient(45deg, #b7b7ba 25%, transparent 25%) 0 0 / 18px 18px,
        linear-gradient(45deg, transparent 75%, #b7b7ba 75%) 0 0 / 18px 18px,
        #dededc;
    }

    .media-window::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      background: linear-gradient(120deg, transparent 25%, rgba(255,255,255,.38) 45%, transparent 65%);
      transform: translateX(-110%);
      transition: opacity .2s ease;
    }

    .polaroid:hover .media-window::after {
      opacity: 1;
      animation: photo-shine .65s ease;
    }

    .media-window img,
    .media-window video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: var(--media-fit);
      object-position: center;
      background: #c4c4c7;
      transition: transform .45s cubic-bezier(.16, 1, .3, 1), filter .25s ease;
    }

    .polaroid:hover .media-window img,
    .polaroid:hover .media-window video {
      transform: scale(1.035);
      filter: saturate(1.04) contrast(1.02);
    }

    .media-window video { pointer-events: none; }

    .video-badge,
    .zip-badge {
      position: absolute;
      top: 8px;
      z-index: 2;
      padding: 6px 7px 5px;
      border: 2px solid var(--ink);
      border-radius: 2px;
      box-shadow: 3px 3px 0 var(--ink);
      font-family: var(--pixel-font);
      font-size: .48rem;
      line-height: 1.2;
    }

    .video-badge {
      left: 8px;
      background: var(--emerald);
    }

    .zip-badge {
      right: 8px;
      background: var(--red);
    }

    .caption {
      position: absolute;
      left: 11px;
      right: 11px;
      bottom: 14px;
      overflow: hidden;
      color: var(--ink);
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .02em;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .message {
      width: min(780px, 100%);
      padding: 24px;
      border: 3px solid var(--ink);
      border-radius: 4px;
      background: var(--paper);
      box-shadow: 8px 8px 0 var(--ink);
      font-weight: 700;
      line-height: 1.65;
    }

    .message code {
      display: inline-block;
      margin-top: 10px;
      overflow-wrap: anywhere;
      color: var(--muted);
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      padding: 20px;
      display: grid;
      place-items: center;
      overscroll-behavior: contain;
      background:
        radial-gradient(circle at center, rgba(80, 80, 86, .62), transparent 62%),
        rgba(8, 8, 10, .96);
      backdrop-filter: blur(8px);
      animation: fade-in .18s ease;
    }

    .lightbox[hidden] { display: none; }

    .lightbox-card {
      width: min(1040px, 96vw);
      max-height: 94vh;
      padding: 12px 12px 62px;
      position: relative;
      border: 3px solid var(--ink);
      border-radius: 4px;
      background: var(--paper);
      box-shadow: 12px 12px 0 var(--magenta);
      animation: viewer-in .24s cubic-bezier(.16, 1, .3, 1);
    }

    .lightbox-card img,
    .lightbox-card video {
      display: block;
      width: 100%;
      max-height: calc(94vh - 92px);
      object-fit: contain;
      border: 3px solid var(--ink);
      background: #111;
    }

    .lightbox-caption {
      position: absolute;
      left: 16px;
      right: 185px;
      bottom: 18px;
      overflow: hidden;
      font-weight: 700;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .lightbox-hint {
      position: absolute;
      right: 76px;
      bottom: 20px;
      color: var(--muted);
      font-family: var(--pixel-font);
      font-size: .46rem;
      line-height: 1.4;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .close-button {
      position: absolute;
      right: 12px;
      bottom: 11px;
      min-height: 38px;
      padding: 8px 11px;
      background: var(--red);
    }

    @keyframes card-in {
      0% {
        opacity: 0;
        transform: translateY(calc(var(--lift) + 34px)) rotate(var(--tilt)) scale(.94);
      }
      100% {
        opacity: 1;
        transform: translateY(var(--lift)) rotate(var(--tilt)) scale(1);
      }
    }

    @keyframes pixel-pulse {
      0%, 74%, 100% { transform: translate(0, 0); }
      78% { transform: translate(-3px, 0); }
      84% { transform: translate(3px, 0); }
      90% { transform: translate(0, 0); }
    }

    @keyframes photo-shine {
      from { transform: translateX(-110%); }
      to   { transform: translateX(110%); }
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes viewer-in {
      from { opacity: 0; transform: translateY(18px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (max-width: 1250px) {
      .gallery { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    @media (max-width: 980px) {
      .gallery { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 700px) {
      .site-header {
        box-shadow: 6px 6px 0 var(--ink);
      }

      .title-accent {
        border-width: 2px;
        box-shadow: 4px 4px 0 var(--red);
      }

      .site-header::before {
        width: 66px;
        background:
          linear-gradient(90deg,
            var(--magenta) 0 14px,
            transparent 14px 18px,
            var(--emerald) 18px 32px,
            transparent 32px 36px,
            var(--green) 36px 50px,
            transparent 50px 54px,
            var(--purple) 54px 66px);
      }

      .toolbar {
        box-shadow: 4px 4px 0 var(--ink);
      }

      .status {
        width: 100%;
        margin-left: 0;
      }

      .gallery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 26px 18px;
      }

      .lightbox-caption {
        right: 76px;
      }

      .lightbox-hint {
        display: none;
      }
    }

    @media (max-width: 440px) {
      .site-header {
        width: min(100% - 22px, 1180px);
        margin-top: 12px;
        padding: 25px 18px;
      }

      h1 {
        font-size: clamp(1.7rem, 10vw, 2.45rem);
        line-height: 1.2;
        text-shadow: 3px 3px 0 rgba(245, 245, 243, .96);
      }

      .toolbar {
        width: min(100% - 22px, 1180px);
      }

      .gallery {
        width: min(340px, calc(100% - 24px));
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        animation-delay: 0ms !important;
        scroll-behavior: auto !important;
        transition: none !important;
      }
    }
  
    /* Softer graphite redesign */
    :root {
      --ink: #24262b;
      --paper: #ececea;
      --cream: #b9bdc2;
      --red: #765662;
      --magenta: #846473;
      --emerald: #56797c;
      --green: #88a6a5;
      --purple: #666178;
      --muted: #696d73;
      --slate: #383b42;
      --steel: #555a63;
      --line: rgba(36, 38, 43, .075);
    }

    body {
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 7%, rgba(136, 166, 165, .16), transparent 28rem),
        radial-gradient(circle at 92% 12%, rgba(118, 86, 98, .11), transparent 30rem),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        linear-gradient(var(--line) 1px, transparent 1px),
        var(--cream);
      background-size: auto, auto, 28px 28px, 28px 28px, auto;
    }

    body::before {
      opacity: .035;
      mix-blend-mode: normal;
    }

    body::after {
      display: none;
    }

    .site-header {
      padding: clamp(30px, 5vw, 58px);
      border: 1px solid rgba(36, 38, 43, .72);
      border-radius: 12px;
      color: #e7e8e8;
      background:
        radial-gradient(circle at 90% 15%, rgba(136, 166, 165, .11), transparent 17rem),
        linear-gradient(145deg, #3d4148, #30333a);
      box-shadow: 0 14px 32px rgba(36, 38, 43, .22);
    }

    .site-header::before {
      top: 22px;
      right: 24px;
      width: 46px;
      height: 8px;
      border: 0;
      border-radius: 999px;
      background:
        linear-gradient(
          90deg,
          var(--green) 0 12px,
          transparent 12px 17px,
          var(--red) 17px 29px,
          transparent 29px 34px,
          #858a91 34px 46px
        );
      box-shadow: none;
      opacity: .72;
      animation: none;
    }

    .site-header::after {
      content: "";
      left: clamp(30px, 5vw, 58px);
      right: auto;
      bottom: clamp(22px, 4vw, 34px);
      width: 76px;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--green), var(--red));
      color: transparent;
      font-size: 0;
      transform: none;
      opacity: .8;
    }

    .eyebrow {
      margin-bottom: 20px;
      color: rgba(231, 232, 232, .68);
      font-family: var(--body-font);
      font-size: clamp(.62rem, 1.5vw, .76rem);
      font-weight: 700;
      line-height: 1.5;
      letter-spacing: .12em;
    }

    h1 {
      max-width: 13ch;
      margin: 0;
      color: #eceeed;
      font-family: var(--pixel-font);
      font-size: clamp(2.15rem, 7vw, 5.15rem);
      font-weight: 700;
      line-height: .95;
      letter-spacing: -.055em;
      text-transform: uppercase;
      text-shadow: 0 3px 0 rgba(19, 20, 24, .32);
    }

    .title-main,
    .title-accent {
      all: unset;
    }

    .subtitle {
      max-width: 650px;
      margin-top: 28px;
      padding-bottom: 18px;
      color: rgba(231, 232, 232, .76);
      font-size: clamp(.88rem, 1.8vw, 1rem);
      font-weight: 400;
      line-height: 1.7;
    }

    .toolbar {
      border: 1px solid rgba(36, 38, 43, .66);
      border-radius: 10px;
      background: rgba(236, 236, 234, .94);
      box-shadow: 0 9px 22px rgba(36, 38, 43, .16);
    }

    button {
      min-height: 44px;
      border: 1px solid rgba(36, 38, 43, .8);
      border-radius: 7px;
      background: #e4e5e4;
      box-shadow: 0 3px 0 rgba(36, 38, 43, .42);
      font-size: .7rem;
      letter-spacing: .035em;
      transition:
        transform .15s ease,
        box-shadow .15s ease,
        background .15s ease;
    }

    button:hover {
      background: #d5dcdb;
      transform: translateY(-1px);
      box-shadow: 0 5px 0 rgba(36, 38, 43, .35);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 rgba(36, 38, 43, .36);
    }

    button[data-active="true"] {
      color: #f0f2f1;
      background: var(--emerald);
      box-shadow: 0 3px 0 #354f51;
    }

    .status {
      color: #eeeeec;
      border: 1px solid rgba(36, 38, 43, .74);
      border-radius: 7px;
      background: var(--red);
      box-shadow: none;
    }

    .polaroid {
      border: 1px solid rgba(36, 38, 43, .72);
      border-radius: 5px;
      box-shadow: 0 8px 20px rgba(36, 38, 43, .18);
    }

    .polaroid:nth-child(4n+1) { background: #ececea; }
    .polaroid:nth-child(4n+2) { background: #e3e5e4; }
    .polaroid:nth-child(4n+3) { background: #dedfe1; }
    .polaroid:nth-child(4n)   { background: #e8e6e8; }

    .polaroid:hover,
    .polaroid:focus-within {
      box-shadow: 0 15px 30px rgba(36, 38, 43, .24);
    }

    .media-window {
      border: 1px solid rgba(36, 38, 43, .76);
    }

    .video-badge,
    .zip-badge {
      border: 1px solid rgba(36, 38, 43, .8);
      border-radius: 4px;
      box-shadow: 0 2px 0 rgba(36, 38, 43, .32);
    }

    .lightbox {
      background: rgba(29, 31, 36, .91);

    const ext=n=>(n.split('.').pop()||'').toLowerCase();
    const readableName=n=>n.split('/').pop().replace(/\.[^.]+$/,'').replace(/[_-]+/g,' ').replace(/\s+/g,' ').trim()||'Media';
    const shuffle=a=>{const c=[...a];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]]}return c};
    const randomBetween=(a,b)=>Math.random()*(b-a)+a;
    const encodeApiPath=p=>p.split('/').filter(Boolean).map(encodeURIComponent).join('/');
    function detectRepository(){const s=window.GALLERY_CONFIG||{};if(s.owner&&s.repo)return{owner:s.owner.trim(),repo:s.repo.trim(),branch:(s.branch||'').trim(),folder:(s.folder||'incog').replace(/^\/+|\/+$/g,'')||'incog'};const h=location.hostname.toLowerCase();if(!h.endsWith('.github.io'))return null;const owner=h.slice(0,-'.github.io'.length),parts=location.pathname.split('/').filter(Boolean),repo=parts[0]||`${owner}.github.io`;return{owner,repo,branch:'',folder:(s.folder||'incog').replace(/^\/+|\/+$/g,'')||'incog'}}
    function showMessage(message,detail){const box=document.createElement('div');box.className='message';box.append(document.createTextNode(message));if(detail){const br=document.createElement('br'),code=document.createElement('code');code.textContent=detail;box.append(br,code)}gallery.replaceChildren(box)}
    function makeElement(item,lightboxMode=false){if(item.kind==='video'){const v=document.createElement('video');v.src=item.url;v.controls=lightboxMode;v.preload=lightboxMode?'metadata':'metadata';v.playsInline=true;v.muted=!lightboxMode;if(!lightboxMode)v.setAttribute('aria-hidden','true');return v}const img=document.createElement('img');img.src=item.url;img.alt=item.name;img.decoding='async';return img}
    function openMedia(item,index=null,focusClose=true){
      const previousVideo=lightboxMedia.querySelector('video');
      if(previousVideo)previousVideo.pause();

      if(Number.isInteger(index)){
        currentMediaIndex=index;
      }else{
        const foundIndex=visibleMediaItems.indexOf(item);
        if(foundIndex>=0)currentMediaIndex=foundIndex;
      }

      const media=makeElement(item,true);
      lightboxMedia.replaceChildren(media);
      const position=visibleMediaItems.length?` • ${currentMediaIndex+1}/${visibleMediaItems.length}`:'';
      lightboxCaption.textContent=`${item.name}${position}`;
      lightbox.hidden=false;
      document.body.style.overflow='hidden';

      if(item.kind==='video'){
        media.currentTime=0;
        media.autoplay=true;
        media.play().catch(error=>{
          console.warn('Automatic video playback was blocked:',error);
        });
      }

      if(focusClose)closeLightbox.focus();
    }
    function navigateMedia(direction){
      if(lightbox.hidden||visibleMediaItems.length<2)return;
      currentMediaIndex=(currentMediaIndex+direction+visibleMediaItems.length)%visibleMediaItems.length;
      openMedia(visibleMediaItems[currentMediaIndex],currentMediaIndex,false);
    }
    function closeMedia(){
      const video=lightboxMedia.querySelector('video');
      if(video)video.pause();
      lightbox.hidden=true;
      lightboxMedia.replaceChildren();
      document.body.style.overflow='';
      currentMediaIndex=-1;
    }
    function syncFilterButtons(){
      const showingImages=activeType==='image';
      imagesBtn.dataset.active=String(showingImages);
      videosBtn.dataset.active=String(!showingImages);
      imagesBtn.setAttribute('aria-pressed',String(showingImages));
      videosBtn.setAttribute('aria-pressed',String(!showingImages));
    }
    function render(){
      gallery.replaceChildren();
      if(!mediaItems.length){
        visibleMediaItems=[];
        showMessage('No supported media was found.','Put images, videos, or ZIP files inside the lowercase /incog folder.');
        status.textContent='NO MEDIA';
        return;
      }
      const imageCount=mediaItems.filter(item=>item.kind==='image').length;
      const videoCount=mediaItems.filter(item=>item.kind==='video').length;
      const visibleItems=mediaItems.filter(item=>item.kind===activeType);
      visibleMediaItems=visibleItems;
      if(!visibleItems.length){
        const label=activeType==='image'?'images':'videos';
        showMessage(`No ${label} were found.`,`Add supported ${label} directly to /incog or place them inside a ZIP file.`);
        status.textContent=`${imageCount} IMAGE${imageCount===1?'':'S'} • ${videoCount} VIDEO${videoCount===1?'':'S'}`;
        return;
      }
      const f=document.createDocumentFragment();
      visibleItems.forEach((item,index)=>{
        const card=document.createElement('figure');
        card.className='polaroid';
        card.style.setProperty('--tilt',`${randomBetween(-3.2,3.2).toFixed(2)}deg`);
        card.style.setProperty('--lift',`${randomBetween(-4,8).toFixed(0)}px`);
        card.style.setProperty('--delay',`${Math.min(index*55,1100)}ms`);
        const button=document.createElement('button');
        button.className='media-button';
        button.type='button';
        button.setAttribute('aria-label',`Open ${item.name}`);
        button.addEventListener('click',()=>openMedia(item,index));
        const frame=document.createElement('span');
        frame.className='media-window';
        const el=makeElement(item,false);
        if(el.tagName==='IMG')el.loading=index<5?'eager':'lazy';
        el.addEventListener('error',()=>{card.remove();console.error('Could not display media:',item.url)},{once:true});
        frame.append(el);
        if(item.kind==='video'){
          const badge=document.createElement('span');
          badge.className='video-badge';
          badge.textContent='VIDEO';
          frame.append(badge);
        }
        if(item.fromZip){
          const badge=document.createElement('span');
          badge.className='zip-badge';
          badge.textContent='ZIP';
          frame.append(badge);
        }
        const caption=document.createElement('figcaption');
        caption.className='caption';
        caption.textContent=item.name;
        button.append(frame);
        card.append(button,caption);
        f.append(card);
      });
      gallery.append(f);
      status.textContent=`${visibleItems.length} ${activeType==='image'?'IMAGE':'VIDEO'}${visibleItems.length===1?'':'S'} • ${imageCount} IMAGE${imageCount===1?'':'S'} • ${videoCount} VIDEO${videoCount===1?'':'S'}`;
    }
    async function githubFetch(url){const r=await fetch(url,{headers:{Accept:'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'},cache:'no-store'});if(!r.ok){let m=`${r.status} ${r.statusText}`;try{const b=await r.json();if(b.message)m=b.message}catch{}throw new Error(m)}return r.json()}
    async function listFolder(repository,path,branch){const endpoint=`https://api.github.com/repos/${encodeURIComponent(repository.owner)}/${encodeURIComponent(repository.repo)}/contents/${encodeApiPath(path)}?ref=${encodeURIComponent(branch)}`;const entries=await githubFetch(endpoint);if(!Array.isArray(entries))return[];const results=[];for(const entry of entries){if(entry.type==='dir'){results.push(...await listFolder(repository,entry.path,branch));continue}if(entry.type!=='file'||!entry.download_url)continue;const e=ext(entry.name);if(IMAGE_EXTENSIONS.has(e)||VIDEO_EXTENSIONS.has(e)||ZIP_EXTENSIONS.has(e))results.push({url:`${entry.download_url}${entry.download_url.includes('?')?'&':'?'}v=${encodeURIComponent(entry.sha||'')}`,name:entry.name,path:entry.path,extension:e,sha:entry.sha||''})}return results}
    async function unpackZip(file,index,total){status.textContent=`OPENING ZIP ${index}/${total}...`;const response=await fetch(file.url,{cache:'no-store'});if(!response.ok)throw new Error(`Could not download ${file.name}: ${response.status}`);const buffer=await response.arrayBuffer();const zip=await JSZip.loadAsync(buffer);const results=[];const entries=Object.values(zip.files).filter(z=>!z.dir&&!z.name.startsWith('__MACOSX/')&&!z.name.split('/').some(part=>part.startsWith('.')));for(const entry of entries){const e=ext(entry.name),kind=IMAGE_EXTENSIONS.has(e)?'image':VIDEO_EXTENSIONS.has(e)?'video':null;if(!kind)continue;const blob=await entry.async('blob');const typedBlob=blob.type?blob:new Blob([blob],{type:MIME[e]||'application/octet-stream'});const url=URL.createObjectURL(typedBlob);objectUrls.push(url);results.push({url,name:readableName(entry.name),kind,fromZip:true})}return results}
    async function loadMedia(){const repository=detectRepository();if(!repository){
      status.hidden=true;
      showMessage('The gallery is not available right now.');
      return;
    }
    status.hidden=false;
    status.textContent='READING REPOSITORY...';try{let branch=repository.branch;if(!branch){const metadata=await githubFetch(`https://api.github.com/repos/${encodeURIComponent(repository.owner)}/${encodeURIComponent(repository.repo)}`);branch=metadata.default_branch||'main'}const files=await listFolder(repository,repository.folder,branch),loose=[],zips=[];for(const file of files){if(file.extension==='zip')zips.push(file);else loose.push({url:file.url,name:readableName(file.name),kind:IMAGE_EXTENSIONS.has(file.extension)?'image':'video',fromZip:false})}mediaItems.push(...loose);for(let i=0;i<zips.length;i++){try{mediaItems.push(...await unpackZip(zips[i],i+1,zips.length))}catch(error){console.error(error);showMessage(`Could not open ${zips[i].name}.`,`${error.message}. Make sure it is a normal ZIP, not a Git LFS pointer.`)}}mediaItems=shuffle(mediaItems);render()}catch(error){console.error(error);status.textContent='LOAD ERROR';const target=`${repository.owner}/${repository.repo}/${repository.folder}`;showMessage(`Could not load the media: ${error.message}`,`Check that ${target} exists, uses lowercase incog, and the repository is public.`)}}
    imagesBtn.addEventListener('click',()=>{activeType='image';syncFilterButtons();render()});
    videosBtn.addEventListener('click',()=>{activeType='video';syncFilterButtons();render()});
    closeLightbox.addEventListener('click',closeMedia);
    lightbox.addEventListener('click',e=>{if(e.target===lightbox)closeMedia()});

    lightbox.addEventListener('wheel',e=>{
      if(lightbox.hidden)return;
      e.preventDefault();
      if(wheelLocked||Math.abs(e.deltaY)<18)return;
      navigateMedia(e.deltaY>0?1:-1);
      wheelLocked=true;
      window.setTimeout(()=>{wheelLocked=false},420);
    },{passive:false});

    lightbox.addEventListener('touchstart',e=>{
      if(lightbox.hidden||e.touches.length!==1)return;
      touchStartY=e.touches[0].clientY;
      touchStartX=e.touches[0].clientX;
    },{passive:true});

    lightbox.addEventListener('touchend',e=>{
      if(lightbox.hidden||touchStartY===null||!e.changedTouches.length)return;
      const endY=e.changedTouches[0].clientY;
      const endX=e.changedTouches[0].clientX;
      const verticalDistance=touchStartY-endY;
      const horizontalDistance=Math.abs(touchStartX-endX);

      if(Math.abs(verticalDistance)>=55&&Math.abs(verticalDistance)>horizontalDistance*1.15){
        navigateMedia(verticalDistance>0?1:-1);
      }

      touchStartY=null;
      touchStartX=null;
    },{passive:true});

    document.addEventListener('keydown',e=>{
      if(lightbox.hidden)return;
      if(e.key==='Escape'){
        closeMedia();
      }else if(e.key==='ArrowDown'||e.key==='PageDown'){
        e.preventDefault();
        navigateMedia(1);
      }else if(e.key==='ArrowUp'||e.key==='PageUp'){
        e.preventDefault();
        navigateMedia(-1);
      }
    });

    window.addEventListener('beforeunload',()=>objectUrls.forEach(URL.revokeObjectURL));
    syncFilterButtons();
    loadMedia();
  </script>
</body>
</html>
