<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#20232a">
  <meta name="description" content="A retro photo and video archive.">
  <title>Incognito Planet</title>
  <link rel="icon" type="image/x-icon" href="./incogplanfavicon.ico?v=6">
  <link rel="shortcut icon" type="image/x-icon" href="./incogplanfavicon.ico?v=6">
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #34383f;
      --panel: #292d33;
      --panel-deep: #202329;
      --paper: #ececea;
      --ink: #1b1e23;
      --text: #eef0ef;
      --muted: #a8adb2;
      --teal: #5c8281;
      --teal-light: #88aaa7;
      --plum: #765160;
      --line: rgba(255,255,255,.065);
      --media-fit: cover;
      --pixel: "Silkscreen", "Courier New", monospace;
      --body: "Space Mono", "Courier New", monospace;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      scrollbar-color: #777d84 var(--panel-deep);
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
      font-family: var(--body);
      background:
        radial-gradient(circle at 10% 4%, rgba(92,130,129,.14), transparent 29rem),
        radial-gradient(circle at 91% 10%, rgba(118,81,96,.10), transparent 30rem),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        linear-gradient(var(--line) 1px, transparent 1px),
        var(--bg);
      background-size: auto, auto, 30px 30px, 30px 30px, auto;
    }

    /* Subtle film grain */
    body::before {
      content: "";
      position: fixed;
      inset: -35%;
      z-index: 30;
      pointer-events: none;
      opacity: .045;
      background-image:
        radial-gradient(circle, #fff 0 1px, transparent 1.2px),
        radial-gradient(circle, #000 0 1px, transparent 1.2px);
      background-position: 0 0, 7px 9px;
      background-size: 13px 13px, 17px 17px;
      animation: grain-shift .28s steps(2,end) infinite;
      mix-blend-mode: overlay;
    }

    .site-header {
      width: min(1180px, calc(100% - 32px));
      min-height: clamp(250px, 31vw, 390px);
      margin: 24px auto 0;
      padding: clamp(30px, 5vw, 58px);
      padding-right: clamp(210px, 33vw, 430px);
      position: relative;
      overflow: hidden;
      isolation: isolate;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px;
      background:
        radial-gradient(circle at 18% 16%, rgba(255,255,255,.035), transparent 19rem),
        linear-gradient(145deg, #2c3037, var(--panel-deep));
      box-shadow: 0 16px 34px rgba(13,14,17,.32);
    }

    /* Retro stripe panel */
    .site-header::before {
      content: "";
      position: absolute;
      top: 0;
      right: clamp(34px, 7vw, 105px);
      bottom: 0;
      width: clamp(150px, 25vw, 300px);
      z-index: 0;
      background:
        linear-gradient(
          90deg,
          #173845 0 11%,
          #d7d0bd 11% 14%,
          #246a76 14% 26%,
          #d7d0bd 26% 29%,
          #4f9994 29% 43%,
          #d7d0bd 43% 46%,
          #9d7a3b 46% 59%,
          #d7d0bd 59% 62%,
          #bd6139 62% 76%,
          #d7d0bd 76% 79%,
          #7d302f 79% 93%,
          #d7d0bd 93% 96%,
          #4e2430 96% 100%
        );
      box-shadow: -18px 0 32px rgba(0,0,0,.18), 18px 0 32px rgba(0,0,0,.14);
      transform-origin: top;
      animation: stripe-arrive .9s cubic-bezier(.16,1,.3,1) both;
    }

    .site-header::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(
          90deg,
          rgba(32,35,41,.98) 0 42%,
          rgba(32,35,41,.88) 54%,
          rgba(32,35,41,.18) 72%,
          transparent 88%
        );
      pointer-events: none;
    }

    .site-header > * {
      position: relative;
      z-index: 2;
    }

    .eyebrow {
      margin: 0 0 20px;
      color: rgba(236,238,237,.68);
      font-size: clamp(.62rem, 1.5vw, .76rem);
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 9.5ch;
      margin: 0;
      color: #f0f1f1;
      font-family: var(--pixel);
      font-size: clamp(2.15rem, 7vw, 5.15rem);
      line-height: .95;
      letter-spacing: -.055em;
      text-transform: uppercase;
      text-shadow: 0 3px 0 rgba(0,0,0,.45);
    }

    .subtitle {
      max-width: 540px;
      margin: 28px 0 0;
      color: rgba(236,238,237,.76);
      font-size: clamp(.88rem, 1.8vw, 1rem);
      line-height: 1.7;
    }

    .toolbar {
      width: min(1180px, calc(100% - 32px));
      min-height: 86px;
      margin: 22px auto 0;
      padding: 17px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 12px;
      background:
        radial-gradient(circle at 82% -25%, rgba(115,145,147,.10), transparent 18rem),
        linear-gradient(145deg, #33373e, #292d33);
      box-shadow: 0 12px 28px rgba(12,14,17,.24), inset 0 1px 0 rgba(255,255,255,.04);
    }

    button {
      appearance: none;
      min-height: 48px;
      padding: 11px 17px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 7px;
      color: #d8dadd;
      background: linear-gradient(180deg, rgba(255,255,255,.025), transparent), #444951;
      box-shadow: 0 3px 0 #1c1f24, inset 0 1px 0 rgba(255,255,255,.035);
      font-family: var(--pixel);
      font-size: .7rem;
      letter-spacing: .035em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease, opacity .15s ease;
    }

    button:hover:not(:disabled) {
      color: #f3f4f4;
      background: linear-gradient(180deg, rgba(255,255,255,.045), transparent), #525861;
      transform: translateY(-1px);
      box-shadow: 0 4px 0 #1b1e22;
    }

    button:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #1b1e22;
    }

    button:focus-visible {
      outline: 3px solid var(--teal-light);
      outline-offset: 3px;
    }

    button:disabled {
      opacity: .32;
      cursor: default;
    }

    button[data-active="true"] {
      color: #f5f6f5;
      border-color: rgba(130,169,166,.58);
      background: linear-gradient(180deg, rgba(255,255,255,.055), transparent), var(--teal);
      box-shadow: 0 3px 0 #35504f, 0 0 0 2px rgba(130,169,166,.10);
    }

    .status {
      margin-left: auto;
      min-height: 42px;
      padding: 9px 13px;
      display: inline-flex;
      align-items: center;
      color: rgba(238,239,239,.76);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 7px;
      background: rgba(24,27,31,.34);
      font-family: var(--pixel);
      font-size: .57rem;
    }

    .status[hidden] { display: none; }

    .gallery {
      width: min(1540px, calc(100% - 20px));
      min-height: 48vh;
      margin: 30px auto 80px;
      padding: 20px 12px 44px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      align-items: start;
      gap: clamp(20px, 2.2vw, 32px);
    }


    .gallery.has-date-sections {
      display: block;
    }

    .date-section {
      width: 100%;
      margin: 0 0 58px;
    }

    .date-section:last-child {
      margin-bottom: 0;
    }

    .date-divider {
      display: grid;
      grid-template-columns: minmax(24px, 1fr) auto minmax(24px, 1fr);
      align-items: center;
      gap: clamp(12px, 2vw, 24px);
      margin: 2px 0 30px;
      color: rgba(239, 241, 240, .92);
    }

    .date-divider::before,
    .date-divider::after {
      content: "";
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(136, 170, 167, .72)
      );
    }

    .date-divider::after {
      background: linear-gradient(
        90deg,
        rgba(136, 170, 167, .72),
        transparent
      );
    }

    .date-heading {
      margin: 0;
      padding: 9px 14px 8px;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 7px;
      background: rgba(36, 40, 46, .84);
      box-shadow: 0 4px 0 rgba(18, 20, 24, .34);
      font-family: var(--pixel);
      font-size: clamp(.64rem, 1.5vw, .82rem);
      font-weight: 400;
      letter-spacing: .045em;
      line-height: 1.3;
      white-space: nowrap;
    }

    .date-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      align-items: start;
      gap: clamp(20px, 2.2vw, 32px);
    }

    .polaroid {
      --tilt: 0deg;
      --lift: 0px;
      --tint: rgba(92,130,129,.14);
      width: 100%;
      min-width: 0;
      margin: 0;
      padding: 11px 11px 44px;
      position: relative;
      border: 1px solid rgba(23,25,30,.24);
      border-radius: 5px;
      background: var(--paper);
      box-shadow: 0 10px 24px rgba(16,18,22,.28);
      opacity: 0;
      transform: translateY(var(--lift)) rotate(var(--tilt)) scale(.95);
      animation: card-in .52s cubic-bezier(.16,1,.3,1) forwards;
      animation-delay: var(--delay);
      transition: transform .2s cubic-bezier(.16,1,.3,1), box-shadow .2s ease;
    }

    /* Random tint behind each neutral Polaroid */
    .polaroid::before {
      content: "";
      position: absolute;
      inset: 7px -7px -7px 7px;
      z-index: -1;
      border-radius: 7px;
      background: var(--tint);
      filter: saturate(.85);
    }

    .polaroid:hover,
    .polaroid:focus-within {
      z-index: 3;
      transform: translateY(calc(var(--lift) - 8px)) rotate(0deg) scale(1.025);
      box-shadow: 0 17px 34px rgba(16,18,22,.38);
    }

    .media-button {
      display: block;
      width: 100%;
      min-height: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      cursor: default;
    }

    .media-button:hover,
    .media-button:active {
      background: transparent;
      transform: none;
      box-shadow: none;
    }

    .media-window {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      position: relative;
      display: block;
      border: 1px solid rgba(23,25,30,.76);
      background: #c9cbcc;
    }

    .media-window img,
    .media-window video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: var(--media-fit);
      object-position: center;
      background: #c4c4c7;
    }

    .media-window img {
      filter: blur(15px) saturate(.72);
      transform: scale(1.08);
      opacity: .68;
      transition: filter .55s ease, transform .55s ease, opacity .55s ease;
    }

    .media-window img.is-loaded {
      filter: blur(0) saturate(1);
      transform: scale(1);
      opacity: 1;
    }

    .media-window video { pointer-events: none; }

    .video-badge,
    .zip-badge {
      position: absolute;
      top: 8px;
      z-index: 2;
      padding: 6px 7px 5px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 4px;
      color: #f3f4f4;
      background: #24272d;
      font-family: var(--pixel);
      font-size: .48rem;
    }

    .video-badge { left: 8px; }
    .zip-badge { right: 8px; }

    .caption {
      position: absolute;
      left: 11px;
      right: 11px;
      bottom: 14px;
      overflow: hidden;
      color: #25272b;
      font-size: .72rem;
      font-weight: 700;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .message {
      width: min(780px, 100%);
      padding: 24px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 8px;
      color: #e8e9e9;
      background: #191c21;
      box-shadow: 0 12px 30px rgba(0,0,0,.24);
      line-height: 1.65;
    }

    /* Loader */
    .loader {
      width: min(420px, 90vw);
      margin: 60px auto;
      display: grid;
      place-items: center;
      gap: 18px;
      color: var(--muted);
      font-family: var(--pixel);
      font-size: .62rem;
      text-align: center;
    }

    .pixel-camera {
      width: 74px;
      height: 52px;
      position: relative;
      border: 5px solid #d9dcdb;
      border-radius: 6px;
      background: #343941;
      box-shadow: 7px 7px 0 rgba(0,0,0,.35);
      animation: camera-bob .9s steps(2,end) infinite;
    }

    .pixel-camera::before {
      content: "";
      position: absolute;
      width: 20px;
      height: 10px;
      left: 9px;
      top: -14px;
      border: 4px solid #d9dcdb;
      border-bottom: 0;
      background: #343941;
    }

    .pixel-camera::after {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      left: 21px;
      top: 10px;
      border: 5px solid #d9dcdb;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: inset 0 0 0 5px #202329;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 40;
      padding: 20px;
      display: grid;
      place-items: center;
      background: rgba(28,30,35,.92);
      backdrop-filter: blur(8px);
    }

    .lightbox[hidden] { display: none; }

    .lightbox-card {
      width: min(1040px, 96vw);
      max-height: 94vh;
      padding: 12px 12px 62px;
      position: relative;
      border: 1px solid rgba(236,236,234,.5);
      border-radius: 9px;
      color: #24262a;
      background: #e8e8e6;
      box-shadow: 0 22px 58px rgba(13,14,17,.48);
    }

    .lightbox-media {
      opacity: 1;
      transform: translateX(0);
      transition: opacity .18s ease, transform .18s ease;
    }

    .lightbox-media.is-changing {
      opacity: 0;
      transform: translateX(var(--slide-direction, 10px));
    }

    .lightbox-card img,
    .lightbox-card video {
      display: block;
      width: 100%;
      max-height: calc(94vh - 92px);
      object-fit: contain;
      border: 1px solid rgba(36,38,43,.78);
      background: #111;
    }

    .lightbox-caption {
      position: absolute;
      left: 16px;
      right: 230px;
      bottom: 18px;
      overflow: hidden;
      font-weight: 700;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .lightbox-counter {
      position: absolute;
      right: 150px;
      bottom: 20px;
      color: #666b70;
      font-family: var(--pixel);
      font-size: .52rem;
    }

    .viewer-nav {
      position: absolute;
      top: 50%;
      z-index: 2;
      min-width: 44px;
      min-height: 54px;
      padding: 8px;
      transform: translateY(-50%);
      color: #fff;
      background: rgba(25,28,33,.82);
      border-color: rgba(255,255,255,.2);
    }

    .viewer-nav:hover:not(:disabled) {
      transform: translateY(calc(-50% - 1px));
    }

    .viewer-prev { left: 22px; }
    .viewer-next { right: 22px; }


    .fullscreen-button {
      position: absolute;
      right: 66px;
      bottom: 11px;
      min-width: 44px;
      min-height: 38px;
      padding: 8px 11px;
      color: #fff;
      background: #343840;
      border-color: rgba(255,255,255,.22);
      box-shadow: 0 3px 0 #111318;
    }

    .fullscreen-button:hover:not(:disabled) {
      color: #fff;
      background: #464b54;
    }

    .idle-slideshow-label {
      position: absolute;
      top: 22px;
      left: 50%;
      z-index: 4;
      max-width: calc(100% - 150px);
      padding: 9px 13px;
      transform: translateX(-50%);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 7px;
      color: rgba(245,246,246,.88);
      background: rgba(20,22,27,.76);
      box-shadow: 0 6px 18px rgba(0,0,0,.24);
      font-family: var(--pixel);
      font-size: clamp(.48rem, 1.2vw, .62rem);
      line-height: 1.5;
      text-align: center;
      pointer-events: none;
      backdrop-filter: blur(6px);
    }

    .idle-slideshow-label[hidden] {
      display: none;
    }

    .lightbox.is-idle-slideshow {
      cursor: default;
      background: #111318;
    }

    .lightbox.is-idle-slideshow .lightbox-card {
      width: 100vw;
      height: 100vh;
      max-height: none;
      padding: 0;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 0;
      background: #111318;
      box-shadow: none;
    }

    .lightbox.is-idle-slideshow .lightbox-media {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }

    .lightbox.is-idle-slideshow .lightbox-card img {
      width: 100%;
      height: 100%;
      max-height: none;
      border: 0;
      object-fit: contain;
      background: #111318;
    }

    .lightbox.is-idle-slideshow .viewer-nav,
    .lightbox.is-idle-slideshow .close-button,
    .lightbox.is-idle-slideshow .fullscreen-button,
    .lightbox.is-idle-slideshow .lightbox-caption,
    .lightbox.is-idle-slideshow .lightbox-counter {
      display: none;
    }

    .lightbox:fullscreen {
      padding: 0;
      background: #090a0c;
    }

    .lightbox:fullscreen .lightbox-card {
      width: 100vw;
      height: 100vh;
      max-height: none;
      padding: 0;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 0;
      background: #090a0c;
      box-shadow: none;
    }

    .lightbox:fullscreen .lightbox-media {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }

    .lightbox:fullscreen .lightbox-card img,
    .lightbox:fullscreen .lightbox-card video {
      width: 100%;
      height: 100%;
      max-height: none;
      border: 0;
      object-fit: contain;
      background: #090a0c;
    }

    .lightbox:fullscreen .viewer-nav {
      position: fixed;
    }

    .lightbox:fullscreen .lightbox-caption {
      position: fixed;
      left: 18px;
      bottom: 18px;
      max-width: calc(100vw - 280px);
      padding: 8px 11px;
      border-radius: 6px;
      color: rgba(245,246,246,.86);
      background: rgba(17,19,24,.7);
    }

    .lightbox:fullscreen .lightbox-counter {
      position: fixed;
      right: 132px;
      bottom: 21px;
      color: rgba(245,246,246,.72);
    }

    .lightbox:fullscreen .fullscreen-button,
    .lightbox:fullscreen .close-button {
      position: fixed;
    }

    .close-button {
      position: absolute;
      right: 12px;
      bottom: 11px;
      min-width: 44px;
      min-height: 38px;
      padding: 8px 11px;
      color: #fff;
      background: #24272d;
      border-color: rgba(255,255,255,.22);
      box-shadow: 0 3px 0 #111318;
    }

    .back-to-top {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 25;
      min-width: 48px;
      padding: 10px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition: opacity .2s ease, transform .2s ease;
    }

    .back-to-top.is-visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    @keyframes card-in {
      to {
        opacity: 1;
        transform: translateY(var(--lift)) rotate(var(--tilt)) scale(1);
      }
    }

    @keyframes stripe-arrive {
      from { opacity: 0; transform: translateY(-100%); }
      to { opacity: .94; transform: translateY(0); }
    }

    @keyframes grain-shift {
      0% { transform: translate(0,0); }
      25% { transform: translate(2%,-1%); }
      50% { transform: translate(-1%,2%); }
      75% { transform: translate(1%,1%); }
      100% { transform: translate(0,0); }
    }

    @keyframes camera-bob {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @media (max-width: 1250px) {
      .gallery,
      .date-grid { grid-template-columns: repeat(4, minmax(0,1fr)); }
    }

    @media (max-width: 980px) {
      .gallery,
      .date-grid { grid-template-columns: repeat(3, minmax(0,1fr)); }
    }

    @media (max-width: 850px) {
      .site-header {
        min-height: 285px;
        padding-right: clamp(130px, 30vw, 235px);
      }

      .site-header::before {
        right: 20px;
        width: clamp(110px, 27vw, 190px);
      }

      .site-header h1 { max-width: 8.5ch; }
    }

    @media (max-width: 700px) {
      .toolbar {
        min-height: 82px;
        padding: 15px 16px;
      }

      .toolbar button { flex: 1 1 120px; }

      .status {
        width: 100%;
        margin-left: 0;
        justify-content: center;
      }

      .gallery,
      .date-grid {
        grid-template-columns: repeat(2, minmax(0,1fr));
        gap: 26px 18px;
      }

      .lightbox-caption { right: 160px; }
      .lightbox-counter { right: 82px; }

      .viewer-prev { left: 9px; }
      .viewer-next { right: 9px; }
    }

    @media (max-width: 560px) {
      .site-header {
        min-height: 330px;
        padding: 28px 112px 34px 24px;
      }

      .site-header::before {
        right: 0;
        width: 96px;
      }

      .site-header h1 {
        max-width: 7.5ch;
        font-size: clamp(1.85rem, 10.5vw, 3rem);
      }

      .site-header .subtitle {
        max-width: 26ch;
        font-size: .84rem;
      }
    }

    @media (max-width: 440px) {
      .gallery {
        width: min(340px, calc(100% - 24px));
        grid-template-columns: 1fr;
      }

      .date-grid {
        grid-template-columns: 1fr;
      }

      .gallery.has-date-sections {
        width: min(100% - 24px, 1540px);
      }

      .date-divider {
        gap: 9px;
      }

      .date-heading {
        padding-inline: 10px;
        font-size: .58rem;
      }

      .lightbox {
        padding: 8px;
      }

      .lightbox-card {
        padding-bottom: 72px;
      }

      .lightbox-caption {
        right: 75px;
        bottom: 40px;
        font-size: .74rem;
      }

      .lightbox-counter {
        left: 16px;
        right: auto;
        bottom: 17px;
      }

      .viewer-nav {
        top: auto;
        bottom: 8px;
        min-height: 40px;
        transform: none;
      }

      .viewer-nav:hover:not(:disabled) {
        transform: translateY(-1px);
      }

      .viewer-prev { left: 92px; }
      .viewer-next { right: 62px; }

      .fullscreen-button {
        right: 60px;
      }

      .close-button { right: 10px; }

      .back-to-top {
        right: 12px;
        bottom: 12px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        animation-delay: 0ms !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <p class="eyebrow">Photo archive // signal 001</p>
    <h1>Incognito Planet</h1>
    <p class="subtitle">Photographs, moving images and small moments collected from another orbit.</p>
  </header>

  <nav class="toolbar" aria-label="Gallery type">
    <button id="imagesBtn" type="button" data-active="true" aria-pressed="true">Images</button>
    <button id="videosBtn" type="button" data-active="false" aria-pressed="false">Videos</button>
    <span class="status" id="status" role="status" aria-live="polite">Connecting...</span>
  </nav>

  <main class="gallery" id="gallery" aria-label="Photography and video gallery">
    <div class="loader" id="loader">
      <span class="pixel-camera" aria-hidden="true"></span>
      <span>Developing the archive...</span>
    </div>
  </main>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Full media viewer" hidden>
    <div class="lightbox-card">
      <button class="viewer-nav viewer-prev" id="prevMedia" type="button" aria-label="Previous media">‹</button>
      <div class="lightbox-media" id="lightboxMedia"></div>
      <button class="viewer-nav viewer-next" id="nextMedia" type="button" aria-label="Next media">›</button>
      <div class="lightbox-caption" id="lightboxCaption"></div>
      <div class="lightbox-counter" id="lightboxCounter"></div>
      <div class="idle-slideshow-label" id="idleSlideshowLabel" hidden>
        Random archive mode • click, touch or press a key to exit
      </div>
      <button class="fullscreen-button" id="fullscreenButton" type="button" aria-label="Enter fullscreen" title="Fullscreen">⛶</button>
      <button class="close-button" id="closeLightbox" type="button" aria-label="Close viewer">X</button>
    </div>
  </div>

  <button class="back-to-top" id="backToTop" type="button" aria-label="Back to top">↑</button>

  <script>
    const gallery = document.querySelector('#gallery');
    const imagesBtn = document.querySelector('#imagesBtn');
    const videosBtn = document.querySelector('#videosBtn');
    const status = document.querySelector('#status');
    const lightbox = document.querySelector('#lightbox');
    const lightboxMedia = document.querySelector('#lightboxMedia');
    const lightboxCaption = document.querySelector('#lightboxCaption');
    const lightboxCounter = document.querySelector('#lightboxCounter');
    const idleSlideshowLabel = document.querySelector('#idleSlideshowLabel');
    const fullscreenButton = document.querySelector('#fullscreenButton');
    const closeLightbox = document.querySelector('#closeLightbox');
    const prevMedia = document.querySelector('#prevMedia');
    const nextMedia = document.querySelector('#nextMedia');
    const backToTop = document.querySelector('#backToTop');

    const REPOSITORY = Object.freeze({
      owner: 'Incognitoplanet',
      repo: 'Incognitoplanet.github.io',
      branch: 'main',
      folder: 'incog'
    });

    const IMAGE_EXTENSIONS = new Set(['jpg','jpeg','png','gif','webp','avif','svg','bmp','ico']);
    const VIDEO_EXTENSIONS = new Set(['mp4','webm','ogv','ogg','mov','m4v']);
    const ZIP_EXTENSIONS = new Set(['zip']);

    const MIME = {
      jpg:'image/jpeg', jpeg:'image/jpeg', png:'image/png', gif:'image/gif',
      webp:'image/webp', avif:'image/avif', svg:'image/svg+xml',
      bmp:'image/bmp', ico:'image/x-icon', mp4:'video/mp4',
      webm:'video/webm', ogv:'video/ogg', ogg:'video/ogg',
      mov:'video/quicktime', m4v:'video/x-m4v'
    };

    const IDLE_START_DELAY = 3 * 60 * 1000;
    const IDLE_SLIDE_DURATION = 90 * 1000;

    const TINTS = [
      'rgba(92,130,129,.18)',
      'rgba(118,81,96,.16)',
      'rgba(109,102,134,.16)',
      'rgba(100,121,141,.16)',
      'rgba(118,141,125,.16)'
    ];

    let mediaItems = [];
    let objectUrls = [];
    let activeType = 'image';
    let visibleMediaItems = [];
    let viewerItems = [];
    let currentMediaIndex = -1;
    let wheelLocked = false;
    let touchStartY = null;
    let touchStartX = null;
    let mediaChangeTimer = null;
    let idleStartTimer = null;
    let idleSlideTimer = null;
    let idleSlideshowActive = false;
    let idleOrder = [];
    let idleOrderIndex = 0;
    let lastIdleImageUrl = '';
    let lastPointerMoveReset = 0;

    const ext = name => (name.split('.').pop() || '').toLowerCase();

    const readableName = name =>
      name.split('/').pop()
        .replace(/\.[^.]+$/, '')
        .replace(/[_-]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim() || 'Media';

    const shuffle = array => {
      const copy = [...array];
      for (let index = copy.length - 1; index > 0; index--) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [copy[index], copy[randomIndex]] = [copy[randomIndex], copy[index]];
      }
      return copy;
    };

    const randomBetween = (minimum, maximum) =>
      Math.random() * (maximum - minimum) + minimum;

    const encodeApiPath = path =>
      path.split('/').filter(Boolean).map(encodeURIComponent).join('/');

    function extractDateGroup(path = '') {
      const segments = path.split('/').filter(Boolean);

      for (const segment of segments) {
        const match = segment.match(/^(\d{2})-(\d{2})-(\d{4})(?:$|[ _-].*)/);
        if (!match) continue;

        const [, dayText, monthText, yearText] = match;
        const day = Number(dayText);
        const month = Number(monthText);
        const year = Number(yearText);
        const timestamp = Date.UTC(year, month - 1, day);
        const date = new Date(timestamp);

        const isValid =
          date.getUTCFullYear() === year &&
          date.getUTCMonth() === month - 1 &&
          date.getUTCDate() === day;

        if (!isValid) continue;

        return {
          dateLabel: `${dayText}-${monthText}-${yearText}`,
          dateSort: timestamp
        };
      }

      return {
        dateLabel: '',
        dateSort: Number.POSITIVE_INFINITY
      };
    }

    function detectRepository() {
      return { ...REPOSITORY };
    }

    function showMessage(message, detail = '') {
      const box = document.createElement('div');
      box.className = 'message';
      box.append(document.createTextNode(message));

      if (detail) {
        const lineBreak = document.createElement('br');
        const code = document.createElement('code');
        code.textContent = detail;
        box.append(lineBreak, code);
      }

      gallery.replaceChildren(box);
    }

    function makeElement(item, lightboxMode = false) {
      if (item.kind === 'video') {
        const video = document.createElement('video');
        video.src = item.url;
        video.controls = lightboxMode;
        video.preload = 'metadata';
        video.playsInline = true;
        video.muted = !lightboxMode;

        if (!lightboxMode) video.setAttribute('aria-hidden', 'true');
        return video;
      }

      const image = document.createElement('img');
      image.src = item.url;
      image.alt = item.name;
      image.decoding = 'async';

      if (!lightboxMode) {
        const markLoaded = () => image.classList.add('is-loaded');
        image.addEventListener('load', markLoaded, { once: true });
        if (image.complete) markLoaded();
      }

      return image;
    }

    function updateViewerControls() {
      const hasItems = viewerItems.length > 0;
      prevMedia.disabled = !hasItems || currentMediaIndex <= 0;
      nextMedia.disabled = !hasItems || currentMediaIndex >= viewerItems.length - 1;
      lightboxCounter.textContent = hasItems
        ? `${currentMediaIndex + 1} / ${viewerItems.length}`
        : '';
    }

    function displayCurrentMedia(direction = 0, focusClose = false) {
      const item = viewerItems[currentMediaIndex];
      if (!item) return;

      const previousVideo = lightboxMedia.querySelector('video');
      if (previousVideo) previousVideo.pause();

      clearTimeout(mediaChangeTimer);
      lightboxMedia.style.setProperty('--slide-direction', `${direction < 0 ? -14 : 14}px`);
      lightboxMedia.classList.add('is-changing');

      mediaChangeTimer = window.setTimeout(() => {
        const media = makeElement(item, true);
        lightboxMedia.replaceChildren(media);
        lightboxCaption.textContent = item.name;
        fullscreenButton.hidden = idleSlideshowActive || item.kind !== 'image';
        updateViewerControls();

        requestAnimationFrame(() => {
          lightboxMedia.classList.remove('is-changing');
        });

        if (item.kind === 'video') {
          media.currentTime = 0;
          media.autoplay = true;
          media.play().catch(() => {});
        }
      }, 145);

      lightbox.hidden = false;
      document.body.style.overflow = 'hidden';

      if (focusClose) closeLightbox.focus();
    }

    function openMedia(item, index) {
      viewerItems = visibleMediaItems;
      currentMediaIndex = Number.isInteger(index)
        ? index
        : viewerItems.indexOf(item);

      displayCurrentMedia(0, true);
    }

    function navigateMedia(direction) {
      if (lightbox.hidden || !viewerItems.length || idleSlideshowActive) return;

      const nextIndex = currentMediaIndex + direction;

      /* Deliberately does not loop from last to first or first to last. */
      if (nextIndex < 0 || nextIndex >= viewerItems.length) {
        updateViewerControls();
        return;
      }

      currentMediaIndex = nextIndex;
      displayCurrentMedia(direction);
    }

    async function leaveBrowserFullscreen() {
      if (!document.fullscreenElement) return;

      try {
        await document.exitFullscreen();
      } catch (error) {
        console.warn('Could not exit fullscreen:', error);
      }
    }

    function hideViewer({ exitFullscreen = true } = {}) {
      const video = lightboxMedia.querySelector('video');
      if (video) video.pause();

      clearTimeout(mediaChangeTimer);
      lightbox.hidden = true;
      lightboxMedia.replaceChildren();
      lightboxMedia.classList.remove('is-changing');
      lightbox.classList.remove('is-idle-slideshow');
      idleSlideshowLabel.hidden = true;
      document.body.style.overflow = '';
      viewerItems = [];
      currentMediaIndex = -1;

      if (exitFullscreen) leaveBrowserFullscreen();
    }

    function closeMedia() {
      if (idleSlideshowActive) {
        stopIdleSlideshow(true);
        return;
      }

      hideViewer();
      scheduleIdleSlideshow();
    }

    async function toggleFullscreen() {
      if (idleSlideshowActive || lightbox.hidden) return;

      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else if (lightbox.requestFullscreen) {
          await lightbox.requestFullscreen();
        } else if (lightbox.webkitRequestFullscreen) {
          lightbox.webkitRequestFullscreen();
        }
      } catch (error) {
        console.warn('Fullscreen is not available:', error);
      }
    }

    function updateFullscreenButton() {
      const isFullscreen = Boolean(document.fullscreenElement);
      fullscreenButton.textContent = isFullscreen ? '↙' : '⛶';
      fullscreenButton.setAttribute(
        'aria-label',
        isFullscreen ? 'Exit fullscreen' : 'Enter fullscreen'
      );
      fullscreenButton.title = isFullscreen ? 'Exit fullscreen' : 'Fullscreen';
    }

    function createIdleOrder(previousUrl = '') {
      const images = shuffle(mediaItems.filter(item => item.kind === 'image'));

      if (
        images.length > 1 &&
        previousUrl &&
        images[0]?.url === previousUrl
      ) {
        [images[0], images[1]] = [images[1], images[0]];
      }

      return images;
    }

    function scheduleNextIdleImage() {
      clearTimeout(idleSlideTimer);

      if (!idleSlideshowActive) return;

      idleSlideTimer = window.setTimeout(() => {
        if (!idleSlideshowActive) return;

        idleOrderIndex += 1;

        if (idleOrderIndex >= idleOrder.length) {
          idleOrder = createIdleOrder(lastIdleImageUrl);
          idleOrderIndex = 0;
          viewerItems = idleOrder;
        }

        const item = idleOrder[idleOrderIndex];
        if (!item) {
          stopIdleSlideshow(true);
          return;
        }

        currentMediaIndex = idleOrderIndex;
        lastIdleImageUrl = item.url;
        displayCurrentMedia(1, false);
        scheduleNextIdleImage();
      }, IDLE_SLIDE_DURATION);
    }

    function startIdleSlideshow() {
      clearTimeout(idleStartTimer);

      if (
        idleSlideshowActive ||
        document.visibilityState !== 'visible'
      ) return;

      idleOrder = createIdleOrder(lastIdleImageUrl);

      if (!idleOrder.length) {
        scheduleIdleSlideshow();
        return;
      }

      idleSlideshowActive = true;
      idleOrderIndex = 0;
      viewerItems = idleOrder;
      currentMediaIndex = 0;
      lastIdleImageUrl = idleOrder[0].url;

      lightbox.classList.add('is-idle-slideshow');
      idleSlideshowLabel.hidden = false;
      fullscreenButton.hidden = true;
      displayCurrentMedia(0, false);
      scheduleNextIdleImage();
    }

    function stopIdleSlideshow(closeViewer = true) {
      if (!idleSlideshowActive) return;

      idleSlideshowActive = false;
      clearTimeout(idleSlideTimer);
      idleOrder = [];
      idleOrderIndex = 0;
      lightbox.classList.remove('is-idle-slideshow');
      idleSlideshowLabel.hidden = true;

      if (closeViewer) {
        hideViewer();
      }

      scheduleIdleSlideshow();
    }

    function scheduleIdleSlideshow() {
      clearTimeout(idleStartTimer);

      if (
        idleSlideshowActive ||
        document.visibilityState !== 'visible' ||
        !mediaItems.some(item => item.kind === 'image')
      ) return;

      idleStartTimer = window.setTimeout(
        startIdleSlideshow,
        IDLE_START_DELAY
      );
    }

    function registerUserActivity(event) {
      if (idleSlideshowActive) {
        if (event?.cancelable) event.preventDefault();
        if (event?.stopImmediatePropagation) event.stopImmediatePropagation();
        stopIdleSlideshow(true);
        return;
      }

      scheduleIdleSlideshow();
    }

    function syncFilterButtons() {
      const showingImages = activeType === 'image';
      imagesBtn.dataset.active = String(showingImages);
      videosBtn.dataset.active = String(!showingImages);
      imagesBtn.setAttribute('aria-pressed', String(showingImages));
      videosBtn.setAttribute('aria-pressed', String(!showingImages));
    }

    function createMediaCard(item, index) {
      const card = document.createElement('figure');
      card.className = 'polaroid';
      card.style.setProperty('--tilt', `${randomBetween(-3.2, 3.2).toFixed(2)}deg`);
      card.style.setProperty('--lift', `${randomBetween(-4, 8).toFixed(0)}px`);
      card.style.setProperty('--delay', `${Math.min(index * 45, 900)}ms`);
      card.style.setProperty('--tint', TINTS[Math.floor(Math.random() * TINTS.length)]);

      const button = document.createElement('button');
      button.className = 'media-button';
      button.type = 'button';
      button.setAttribute('aria-label', `Open ${item.name}`);
      button.addEventListener('click', () => openMedia(item, index));

      const frame = document.createElement('span');
      frame.className = 'media-window';

      const media = makeElement(item, false);
      if (media.tagName === 'IMG') media.loading = index < 5 ? 'eager' : 'lazy';

      media.addEventListener('error', () => {
        card.remove();
        console.error('Could not display media:', item.url);
      }, { once: true });

      frame.append(media);

      if (item.kind === 'video') {
        const badge = document.createElement('span');
        badge.className = 'video-badge';
        badge.textContent = 'Video';
        frame.append(badge);
      }

      if (item.fromZip) {
        const badge = document.createElement('span');
        badge.className = 'zip-badge';
        badge.textContent = 'ZIP';
        frame.append(badge);
      }

      const caption = document.createElement('figcaption');
      caption.className = 'caption';
      caption.textContent = item.name;

      button.append(frame);
      card.append(button, caption);
      return card;
    }

    function render() {
      gallery.replaceChildren();
      gallery.classList.remove('has-date-sections');

      if (!mediaItems.length) {
        visibleMediaItems = [];
        showMessage('No supported media was found.');
        status.textContent = 'No media';
        return;
      }

      const imageCount = mediaItems.filter(item => item.kind === 'image').length;
      const videoCount = mediaItems.filter(item => item.kind === 'video').length;
      const filteredItems = mediaItems.filter(item => item.kind === activeType);

      if (!filteredItems.length) {
        visibleMediaItems = [];
        const label = activeType === 'image' ? 'images' : 'videos';
        showMessage(`No ${label} were found.`);
        status.textContent = `${imageCount} images • ${videoCount} videos`;
        return;
      }

      const datedGroups = new Map();
      const undatedItems = [];

      for (const item of filteredItems) {
        if (!item.dateLabel) {
          undatedItems.push(item);
          continue;
        }

        if (!datedGroups.has(item.dateLabel)) {
          datedGroups.set(item.dateLabel, {
            label: item.dateLabel,
            sort: item.dateSort,
            items: []
          });
        }

        datedGroups.get(item.dateLabel).items.push(item);
      }

      const groups = [...datedGroups.values()]
        .sort((a, b) => a.sort - b.sort);

      if (undatedItems.length) {
        groups.push({
          label: 'Other',
          sort: Number.POSITIVE_INFINITY,
          items: undatedItems
        });
      }

      const hasDatedFolders = datedGroups.size > 0;

      if (!hasDatedFolders) {
        visibleMediaItems = filteredItems;
        const fragment = document.createDocumentFragment();

        visibleMediaItems.forEach((item, index) => {
          fragment.append(createMediaCard(item, index));
        });

        gallery.append(fragment);
      } else {
        gallery.classList.add('has-date-sections');
        visibleMediaItems = groups.flatMap(group => group.items);

        let globalIndex = 0;
        const fragment = document.createDocumentFragment();

        for (const group of groups) {
          const section = document.createElement('section');
          section.className = 'date-section';
          section.setAttribute('aria-label', group.label);

          const divider = document.createElement('header');
          divider.className = 'date-divider';

          const heading = document.createElement('h2');
          heading.className = 'date-heading';
          heading.textContent = group.label;

          divider.append(heading);

          const grid = document.createElement('div');
          grid.className = 'date-grid';

          for (const item of group.items) {
            grid.append(createMediaCard(item, globalIndex));
            globalIndex += 1;
          }

          section.append(divider, grid);
          fragment.append(section);
        }

        gallery.append(fragment);
      }

      status.textContent = `${visibleMediaItems.length} ${activeType === 'image' ? 'images' : 'videos'}`;
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, {
        cache: 'no-store',
        ...options
      });

      if (!response.ok) {
        let message = `${response.status} ${response.statusText}`;

        try {
          const body = await response.json();
          if (body.message) message = body.message;
        } catch {}

        throw new Error(message);
      }

      return response.json();
    }

    function supportedRepositoryFile(path) {
      const extension = ext(path);

      return (
        IMAGE_EXTENSIONS.has(extension) ||
        VIDEO_EXTENSIONS.has(extension) ||
        ZIP_EXTENSIONS.has(extension)
      );
    }

    function rawGitHubUrl(repository, branch, path, version = '') {
      const base =
        `https://raw.githubusercontent.com/` +
        `${encodeURIComponent(repository.owner)}/` +
        `${encodeURIComponent(repository.repo)}/` +
        `${encodeURIComponent(branch)}/` +
        `${encodeApiPath(path)}`;

      return version
        ? `${base}?v=${encodeURIComponent(version)}`
        : base;
    }

    function jsDelivrUrl(repository, branch, path, version = '') {
      const base =
        `https://cdn.jsdelivr.net/gh/` +
        `${encodeURIComponent(repository.owner)}/` +
        `${encodeURIComponent(repository.repo)}@` +
        `${encodeURIComponent(branch)}/` +
        `${encodeApiPath(path)}`;

      return version
        ? `${base}?v=${encodeURIComponent(version)}`
        : base;
    }

    async function listFilesWithGitHubTree(repository, folder, branch) {
      const endpoint =
        `https://api.github.com/repos/` +
        `${encodeURIComponent(repository.owner)}/` +
        `${encodeURIComponent(repository.repo)}/git/trees/` +
        `${encodeURIComponent(branch)}?recursive=1`;

      const data = await fetchJson(endpoint, {
        headers: {
          Accept: 'application/vnd.github+json',
          'X-GitHub-Api-Version': '2022-11-28'
        }
      });

      if (!Array.isArray(data.tree)) {
        throw new Error('GitHub did not return a repository tree');
      }

      if (data.truncated) {
        throw new Error('The GitHub repository tree was truncated');
      }

      const prefix = folder ? `${folder.replace(/^\/+|\/+$/g, '')}/` : '';

      return data.tree
        .filter(entry =>
          entry.type === 'blob' &&
          entry.path.startsWith(prefix) &&
          supportedRepositoryFile(entry.path)
        )
        .map(entry => ({
          url: rawGitHubUrl(repository, branch, entry.path, entry.sha || ''),
          name: entry.path.split('/').pop(),
          path: entry.path,
          extension: ext(entry.path),
          sha: entry.sha || ''
        }));
    }

    async function listFilesWithJsDelivr(repository, folder, branch) {
      const endpoint =
        `https://data.jsdelivr.com/v1/package/gh/` +
        `${encodeURIComponent(repository.owner)}/` +
        `${encodeURIComponent(repository.repo)}@` +
        `${encodeURIComponent(branch)}/flat`;

      const data = await fetchJson(endpoint);
      if (!Array.isArray(data.files)) {
        throw new Error('The backup file service returned no file list');
      }

      const prefix = folder ? `${folder.replace(/^\/+|\/+$/g, '')}/` : '';

      return data.files
        .map(entry => ({
          entry,
          path: String(entry.name || '').replace(/^\/+/, '')
        }))
        .filter(({ path }) =>
          path.startsWith(prefix) &&
          supportedRepositoryFile(path)
        )
        .map(({ entry, path }) => ({
          url: jsDelivrUrl(
            repository,
            branch,
            path,
            entry.hash || entry.time || ''
          ),
          name: path.split('/').pop(),
          path,
          extension: ext(path),
          sha: entry.hash || ''
        }));
    }

    async function listRepositoryFiles(repository, folder, branch) {
      const errors = [];

      try {
        status.textContent = 'Reading archive...';
        const files = await listFilesWithGitHubTree(
          repository,
          folder,
          branch
        );

        if (files.length) return files;
        errors.push('GitHub returned no supported media');
      } catch (error) {
        console.warn('Primary repository listing failed:', error);
        errors.push(`GitHub: ${error.message}`);
      }

      try {
        status.textContent = 'Trying backup...';
        const files = await listFilesWithJsDelivr(
          repository,
          folder,
          branch
        );

        if (files.length) return files;
        errors.push('Backup returned no supported media');
      } catch (error) {
        console.warn('Backup repository listing failed:', error);
        errors.push(`Backup: ${error.message}`);
      }

      throw new Error(errors.join(' | '));
    }

    let jsZipPromise = null;

    function loadJSZip() {
      if (window.JSZip) return Promise.resolve(window.JSZip);
      if (jsZipPromise) return jsZipPromise;

      jsZipPromise = new Promise((resolve, reject) => {
        const script = document.createElement('script');
        const timeout = window.setTimeout(() => {
          script.remove();
          jsZipPromise = null;
          reject(new Error('ZIP support took too long to load'));
        }, 12000);

        script.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
        script.async = true;

        script.addEventListener('load', () => {
          window.clearTimeout(timeout);

          if (window.JSZip) {
            resolve(window.JSZip);
          } else {
            jsZipPromise = null;
            reject(new Error('ZIP support did not initialise'));
          }
        }, { once: true });

        script.addEventListener('error', () => {
          window.clearTimeout(timeout);
          jsZipPromise = null;
          reject(new Error('ZIP support could not be downloaded'));
        }, { once: true });

        document.head.append(script);
      });

      return jsZipPromise;
    }

    async function unpackZip(file, index, total) {
      status.textContent = `Opening ZIP ${index}/${total}...`;

      const response = await fetch(file.url, { cache: 'no-store' });
      if (!response.ok) {
        throw new Error(`Could not download ${file.name}: ${response.status}`);
      }

      const buffer = await response.arrayBuffer();
      const JSZipLibrary = await loadJSZip();
      const zip = await JSZipLibrary.loadAsync(buffer);
      const results = [];

      const entries = Object.values(zip.files).filter(entry =>
        !entry.dir &&
        !entry.name.startsWith('__MACOSX/') &&
        !entry.name.split('/').some(part => part.startsWith('.'))
      );

      for (const entry of entries) {
        const extension = ext(entry.name);
        const kind = IMAGE_EXTENSIONS.has(extension)
          ? 'image'
          : VIDEO_EXTENSIONS.has(extension)
            ? 'video'
            : null;

        if (!kind) continue;

        const blob = await entry.async('blob');
        const typedBlob = blob.type
          ? blob
          : new Blob([blob], { type: MIME[extension] || 'application/octet-stream' });

        const url = URL.createObjectURL(typedBlob);
        objectUrls.push(url);

        const entryDateGroup = extractDateGroup(entry.name);
        const inheritedDateGroup = entryDateGroup.dateLabel
          ? entryDateGroup
          : {
              dateLabel: file.dateLabel || '',
              dateSort: file.dateSort ?? Number.POSITIVE_INFINITY
            };

        results.push({
          url,
          name: readableName(entry.name),
          kind,
          fromZip: true,
          ...inheritedDateGroup
        });
      }

      return results;
    }

    async function loadMedia() {
      const repository = detectRepository();

      if (!repository) {
        status.hidden = true;
        showMessage('The gallery is not available right now.');
        return;
      }

      status.hidden = false;
      status.textContent = 'Reading archive...';

      try {
        let branch = repository.branch;

        if (!branch) {
          const metadata = await githubFetch(
            `https://api.github.com/repos/${encodeURIComponent(repository.owner)}/${encodeURIComponent(repository.repo)}`
          );
          branch = metadata.default_branch || 'main';
        }

        const files = await listRepositoryFiles(repository, repository.folder, branch);
        const loose = [];
        const zips = [];

        for (const file of files) {
          const dateGroup = extractDateGroup(file.path);

          if (file.extension === 'zip') {
            zips.push({
              ...file,
              ...dateGroup
            });
          } else {
            loose.push({
              url: file.url,
              name: readableName(file.name),
              kind: IMAGE_EXTENSIONS.has(file.extension) ? 'image' : 'video',
              fromZip: false,
              ...dateGroup
            });
          }
        }

        mediaItems.push(...loose);

        for (let index = 0; index < zips.length; index++) {
          try {
            mediaItems.push(...await unpackZip(zips[index], index + 1, zips.length));
          } catch (error) {
            console.error(error);
          }
        }

        mediaItems = shuffle(mediaItems);
        render();
        scheduleIdleSlideshow();
      } catch (error) {
        console.error(error);
        status.textContent = 'Load error';
        showMessage(
          'The gallery could not be loaded.',
          'Please wait a moment and refresh the page.'
        );
      }
    }

    imagesBtn.addEventListener('click', () => {
      activeType = 'image';
      syncFilterButtons();
      render();
    });

    videosBtn.addEventListener('click', () => {
      activeType = 'video';
      syncFilterButtons();
      render();
    });

    prevMedia.addEventListener('click', () => navigateMedia(-1));
    nextMedia.addEventListener('click', () => navigateMedia(1));
    fullscreenButton.addEventListener('click', toggleFullscreen);
    closeLightbox.addEventListener('click', closeMedia);

    document.addEventListener('fullscreenchange', updateFullscreenButton);
    document.addEventListener('webkitfullscreenchange', updateFullscreenButton);

    lightbox.addEventListener('click', event => {
      if (event.target === lightbox) closeMedia();
    });

    lightbox.addEventListener('wheel', event => {
      if (lightbox.hidden) return;

      event.preventDefault();

      if (wheelLocked || Math.abs(event.deltaY) < 18) return;

      navigateMedia(event.deltaY > 0 ? 1 : -1);
      wheelLocked = true;
      window.setTimeout(() => { wheelLocked = false; }, 420);
    }, { passive: false });

    lightbox.addEventListener('touchstart', event => {
      if (lightbox.hidden || event.touches.length !== 1) return;
      touchStartY = event.touches[0].clientY;
      touchStartX = event.touches[0].clientX;
    }, { passive: true });

    lightbox.addEventListener('touchend', event => {
      if (
        lightbox.hidden ||
        touchStartY === null ||
        touchStartX === null ||
        !event.changedTouches.length
      ) return;

      const endY = event.changedTouches[0].clientY;
      const endX = event.changedTouches[0].clientX;
      const vertical = touchStartY - endY;
      const horizontal = touchStartX - endX;

      if (Math.max(Math.abs(vertical), Math.abs(horizontal)) >= 55) {
        const primary = Math.abs(horizontal) > Math.abs(vertical) ? horizontal : vertical;
        navigateMedia(primary > 0 ? 1 : -1);
      }

      touchStartY = null;
      touchStartX = null;
    }, { passive: true });

    document.addEventListener('keydown', event => {
      if (idleSlideshowActive) {
        registerUserActivity(event);
        return;
      }

      if (lightbox.hidden) return;

      if (event.key === 'Escape') {
        closeMedia();
      } else if (
        event.key === 'ArrowRight' ||
        event.key === 'ArrowDown' ||
        event.key === 'PageDown'
      ) {
        event.preventDefault();
        navigateMedia(1);
      } else if (
        event.key === 'ArrowLeft' ||
        event.key === 'ArrowUp' ||
        event.key === 'PageUp'
      ) {
        event.preventDefault();
        navigateMedia(-1);
      } else if (event.key.toLowerCase() === 'f') {
        event.preventDefault();
        toggleFullscreen();
      }
    });

    document.addEventListener('pointerdown', registerUserActivity, {
      capture: true
    });

    document.addEventListener('wheel', registerUserActivity, {
      capture: true,
      passive: false
    });

    document.addEventListener('pointermove', () => {
      if (idleSlideshowActive) return;

      const now = Date.now();
      if (now - lastPointerMoveReset < 5000) return;

      lastPointerMoveReset = now;
      scheduleIdleSlideshow();
    }, { passive: true });

    window.addEventListener('scroll', () => {
      backToTop.classList.toggle('is-visible', window.scrollY > 650);
    }, { passive: true });

    backToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        clearTimeout(idleStartTimer);

        if (idleSlideshowActive) {
          stopIdleSlideshow(true);
        }
      } else {
        scheduleIdleSlideshow();
      }
    });

    window.addEventListener('beforeunload', () => {
      clearTimeout(idleStartTimer);
      clearTimeout(idleSlideTimer);
      objectUrls.forEach(URL.revokeObjectURL);
    });

    syncFilterButtons();
    loadMedia();
  </script>
</body>
</html>
